name: Forward-port reminder

# Enforcement contínuo do fluxo multi-linha (#147): quando sai um patch ESTÁVEL
# numa linha de manutenção (v0.3.x, v0.4.x...), abre um issue lembrando de
# forward-portar o fix para as linhas mais novas até o master. A decisão e o
# cherry-pick continuam humanos (label `port:<branch>` no PR) — isto é só o
# gatilho pra a regra não depender de memória. Publicação de imagem/tag móvel é
# a #146.
#
# A linha sai da própria tag, então abrir uma release/0.5 amanhã não exige mexer
# aqui: só a lista de linhas de manutenção abaixo. Não dispare na linha de
# desenvolvimento atual (o master já É o alvo do forward-port).

on:
  push:
    tags:
      - "v0.3.*"
      - "v0.4.*"

permissions:
  contents: read
  issues: write

jobs:
  remind:
    runs-on: ubuntu-latest
    # Só releases estáveis: ignora pré-releases (v0.4.x-dev.N / -rc.N).
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      - name: Abrir issue de forward-port
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const minor = tag.replace(/^v/, '').split('.').slice(0, 2).join('.');
            const linha = `release/${minor}`;
            const title = `Forward-port: ${tag} → master`;
            const body = [
              `O release de manutenção **${tag}** saiu na linha \`${linha}\`.`,
              '',
              'Pela política (README → *Deploy e versionamento*), o fix precisa subir',
              'até o `master` por **cherry-pick** (squash-safe), passando por cada',
              'linha intermediária mais nova que `' + linha + '`:',
              '',
              `- [ ] Confirmar se o(s) fix(es) de ${tag} já foram forward-portados`,
              '- [ ] Se não, adicionar o label `port:<branch-alvo>` no(s) PR(s) de origem',
              `- [ ] Verificar \`${linha}\` vs a linha seguinte (e o \`master\`) sem divergência pendente`,
              '',
              '_Aberto automaticamente por `.github/workflows/forward-port-reminder.yml` (#147)._',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
            });
