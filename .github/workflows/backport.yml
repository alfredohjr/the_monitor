name: Forward-port / backport

# Leva um PR já mergeado para outra linha via cherry-pick automático.
# Uso: adicione um label no PR indicando a branch alvo, no formato port:<branch>
#   - port:master          -> forward-port de um fix de uma linha de manutenção
#                             (release/0.3, release/0.4...) para o master
#   - port:release/0.4     -> backport de um fix do master para a linha 0.4.x
#   - port:release/0.3     -> idem para a linha 0.3.x
# O alvo sai do próprio label, então novas linhas não exigem mexer aqui.
# A action abre um novo PR com o cherry-pick (adequado ao nosso fluxo de squash-merge).

on:
  pull_request_target:
    types: [closed, labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  port:
    name: Cherry-pick para a branch alvo
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Backport / forward-port
        uses: korthout/backport-action@v3
        with:
          label_pattern: "^port:([^ ]+)$"
          pull_title: "port: ${pull_title} (para ${target_branch})"
          pull_description: |
            Cherry-pick automático do #${pull_number} para `${target_branch}`.
