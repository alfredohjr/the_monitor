# Deploy numa VPS x86_64 com Cloudflare na frente — #190.
#
# Topologia: só o Caddy fala com a internet; frontend/backend/postgres conversam
# pela rede interna do Compose (hostname = nome do serviço). Nenhum outro serviço
# publica porta — numa VPS com IP público, um `ports:` no postgres é banco aberto
# pra internet.
#
# Roda as imagens do GHCR (amd64, nativo aqui) — não builda. A tag móvel ':0.4'
# abaixo é o ÚNICO ponto que decide a linha acompanhada; o Watchtower puxa os
# patches dela. Migrar de linha (:0.5) é ato deliberado. Nunca use 'latest'.
#
# Uso:  cd deploy/vps && docker compose up -d
# Requer:  deploy/vps/.env (a partir do .env.example). No padrão (Variante B),
#          o TUNNEL_TOKEN é obrigatório e o mount usa o Caddyfile.tunnel.
#
# Variante B (padrão abaixo): Cloudflare Tunnel — nenhuma porta aberta na VPS; o
# `cloudflared` faz a conexão de saída e o Caddy serve HTTP interno via
# Caddyfile.tunnel. Para a Variante A (proxy laranja + Origin Certificate):
# descomente o bloco `ports:` e o volume `./certs` do caddy, troque o mount para
# ./Caddyfile e comente o serviço `cloudflared`.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/alfredohjr/the_monitor-backend:0.4
    restart: unless-stopped
    # env_file (e não só `environment:`): o backend lê SECRET_KEY, FRONTEND_URL,
    # GOOGLE_CLIENT_ID e EMAIL_HORA além do DATABASE_URL. Listar só o DATABASE_URL
    # faz o link de verificação de e-mail sair apontando pra localhost e a app
    # rodar com o SECRET_KEY default do repositório (#191).
    env_file: .env
    environment:
      # Montado aqui (e não no .env) porque o host é o nome do serviço do Compose.
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    expose: ["8000"]          # visível só na rede interna, nunca na internet
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/version').status==200 else sys.exit(1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    # A base da API é inlinada no bundle em build time — a imagem publicada já vem
    # same-origin (/api/v1/...) desde o #189. Não há o que configurar aqui.
    image: ghcr.io/alfredohjr/the_monitor-frontend:0.4
    restart: unless-stopped
    depends_on:
      - backend
    expose: ["3000"]
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN}
    # Variante B (padrão): sem `ports:` — a VPS não abre 80/443, o cloudflared
    # entrega em http://caddy:80. Para a Variante A, descomente este bloco.
    # ports:
    #   - "80:80"
    #   - "443:443"
    volumes:
      # Variante B: Caddyfile.tunnel (HTTP interno, sem TLS). Para a Variante A,
      # troque para ./Caddyfile e descomente o volume ./certs abaixo.
      - ./Caddyfile.tunnel:/etc/caddy/Caddyfile:ro
      # - ./certs:/etc/caddy/certs:ro   # só na Variante A (Origin Certificate)
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    networks: [internal]

  # Puxa e reinicia os containers quando a tag móvel (:0.4) recebe um novo patch.
  # Não cruza para 0.5 sozinho — a tag 0.4 para de andar quando sai a 0.5.0.
  # Fork mantido: containrrr/watchtower foi arquivado (dez/2025); nickfedor/watchtower
  # é o sucessor ativo, drop-in compatível.
  watchtower:
    image: nickfedor/watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --cleanup --interval 300
    networks: [internal]

  # Variante B (padrão): abre o túnel de saída pro Cloudflare e entrega em
  # http://caddy:80. Requer TUNNEL_TOKEN no .env. Para a Variante A, comente
  # este serviço. O destino do Public Hostname (no painel) é `http://caddy:80`,
  # e o DNS do domínio deve ser o CNAME do túnel — nunca um A pro IP da VPS.
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on: [caddy]
    networks: [internal]

volumes:
  pgdata:
  caddy_data:
  caddy_config:

networks:
  internal:
